[build]
  base = "frontend"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# Redirect all /api/* calls to the Netlify serverless proxy function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# React Router — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
